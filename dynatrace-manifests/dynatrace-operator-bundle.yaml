apiVersion: apps/v1
kind: Deployment
metadata:
  name: dynatrace-webhook
  namespace: dynatrace
  annotations:
  labels:
    app.kubernetes.io/name: dynatrace-operator
    app.kubernetes.io/version: "1.8.1"
    app.kubernetes.io/component: webhook
spec:
  replicas: 2
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      internal.dynatrace.com/component: webhook
      internal.dynatrace.com/app: webhook
  strategy:
    type: RollingUpdate
  template:
    metadata:
      annotations:
        dynatrace.com/inject: "false"
        kubectl.kubernetes.io/default-container: webhook
      labels:
        app.kubernetes.io/name: dynatrace-operator
        app.kubernetes.io/version: "1.8.1"
        app.kubernetes.io/component: webhook
        internal.dynatrace.com/component: webhook
        internal.dynatrace.com/app: webhook
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: "topology.kubernetes.io/zone"
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              internal.dynatrace.com/component: webhook
              internal.dynatrace.com/app: webhook
        - maxSkew: 1
          topologyKey: "kubernetes.io/hostname"
          whenUnsatisfiable: DoNotSchedule
          nodeTaintsPolicy: Honor
          labelSelector:
            matchLabels:
              internal.dynatrace.com/component: webhook
              internal.dynatrace.com/app: webhook
      volumes:
      - emptyDir:
          sizeLimit: 10Mi
        name: certs-dir
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - amd64
                      - arm64
                      - ppc64le
                      - s390x
                  - key: kubernetes.io/os
                    operator: In
                    values:
                      - linux
      containers:
        - name: webhook
          args:
            - webhook-server
            # OLM mounts the certificates here, so we reuse it for simplicity
            - --certs-dir=/tmp/k8s-webhook-server/serving-certs/
          image: public.ecr.aws/dynatrace/dynatrace-operator:v1.8.1@sha256:aee68816f3d37d02df1f2afb5898153dbcb9b34274e2bf98b4429bdc77774c28
          imagePullPolicy: Always
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: WEBHOOK_PORT
              value: "8443"
            - name: HEALTH_PROBE_BIND_ADDRESS
              value: ":10080"
            - name: METRICS_BIND_ADDRESS
              value: ":8383"
            
            - name: GOMEMLIMIT
              value: 116MiB
            
            - name: modules.json
              value: |
                {
                  "csiDriver": false,
                  "activeGate": true,
                  "oneAgent": true,
                  "extensions": true,
                  "logMonitoring": true,
                  "edgeConnect": true,
                  "supportability": true,
                  "kubernetesMonitoring": true,
                  "kspm": true
                }
          readinessProbe:
            httpGet:
              path: /readyz
              port: livez
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: livez
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 10
          ports:
            - name: server-port
              containerPort: 8443
            - name: livez
              containerPort: 10080
            - name: metrics
              containerPort: 8383
          resources:
            requests:
              cpu: 300m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 128Mi
          volumeMounts:
            - name: certs-dir
              mountPath: /tmp/k8s-webhook-server/serving-certs/
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
      serviceAccountName: dynatrace-webhook
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      tolerations:
        - key: kubernetes.io/arch
          value: arm64
          effect: NoSchedule
        - key: kubernetes.io/arch
          value: amd64
          effect: NoSchedule
        - key: kubernetes.io/arch
          value: ppc64le
          effect: NoSchedule
        - key: kubernetes.io/arch
          value: s390x
          effect: NoSchedule
